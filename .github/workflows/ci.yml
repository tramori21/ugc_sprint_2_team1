name: ci

on:
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r ugc_api/requirements.txt
          pip install -r ugc_etl/requirements.txt
          pip install ruff mypy psycopg[binary] sentry-sdk[fastapi]

      - name: Run ruff
        run: |
          ruff check src/main.py src/core/config.py src/core/tracing.py src/db/mongo.py src/api/router.py src/api/v1/ugc.py src/models/schemas.py src/services/ugc_service.py ugc_api/src/main.py ugc_api/src/core/tracing.py ugc_etl/src/main.py tests/test_ugc_crud_integration.py

      - name: Run mypy
        run: |
          mypy --config-file mypy.ini src/main.py src/core/config.py src/core/tracing.py src/db/mongo.py src/api/router.py src/api/v1/ugc.py src/models/schemas.py src/services/ugc_service.py
          mypy --config-file mypy.ini ugc_api/src/main.py ugc_api/src/core/tracing.py
          mypy --config-file mypy.ini ugc_etl/src/main.py

      - name: Start services
        run: |
          docker compose up -d --build
          sleep 35
          docker compose ps

      - name: Run tests
        run: |
          python -m pytest -q tests/test_integration.py tests/test_ugc_integration.py tests/test_ugc_crud_integration.py -s

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs auth --tail 200
          docker compose logs ugc_api --tail 200
          docker compose logs ugc_etl --tail 200
          docker compose logs mongodb --tail 200
          docker compose logs kafka --tail 200

      - name: Stop services
        if: always()
        run: |
          docker compose down -v --remove-orphans

  telegram:
    runs-on: ubuntu-latest
    needs: lint-type-test
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ needs.lint-type-test.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi

          MESSAGE="CI status: ${JOB_STATUS}%0ARepo: ${REPOSITORY}%0ABranch: ${BRANCH_NAME}%0ARun: ${RUN_URL}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}"